services:

  # 1. FastAPI Backend
  - type: web
    name: chaatly-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      # IMPORTANT: These must be filled in the Render Dashboard manually
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: CSRF_SECRET_KEY
        generateValue: true
      - key: SENTRY_DSN
        sync: false

  # 3. Expo Frontend (Static Site)
  - type: web
    name: chaatly-frontend
    env: static
    buildCommand: "cd frontend && npm install && npx expo export -p web"
    staticPublishPath: "./frontend/dist"
    envVars:
      # Automatically point frontend to the backend's Render URL
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: chaatly-backend
          envVarKey: RENDER_EXTERNAL_URL
